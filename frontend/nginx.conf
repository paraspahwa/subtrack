server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes served by React Native web bundle
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend (optional when running in Docker)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://backend:8000;
    }
}
