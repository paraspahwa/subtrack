# ─────────────────────────────────────────────────────────────────────
# SubTrack — Docker Compose (Supabase + GitHub Secrets)
#
# LOCAL DEV:  docker compose up --build
# CI/CD:      Variables injected via GitHub Secrets → environment:
#
# Required GitHub Secrets:
#   DATABASE_URL, SECRET_KEY, RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET,
#   RAZORPAY_WEBHOOK_SECRET, NEXT_PUBLIC_API_URL
# ─────────────────────────────────────────────────────────────────────

services:
  backend:
    build: ./backend
    container_name: subtrack_backend
    ports:
      - "8000:8000"
    environment:
      # All values use ${VAR:-fallback} pattern
      # GitHub Actions will inject secrets as env vars before docker compose up
      
      # Database (Supabase)
      DATABASE_URL: ${DATABASE_URL}
      
      # Security
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_SECONDS: ${ACCESS_TOKEN_EXPIRE_SECONDS:-86400}
      RETURN_RESET_TOKEN: ${RETURN_RESET_TOKEN:-false}
      
      # Payments (Razorpay)
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time args (baked into image)
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: subtrack_frontend
    ports:
      - "3000:3000"
    environment:
      # Runtime env vars
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped